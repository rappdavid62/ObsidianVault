[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Critical for Service Worker and PWA on Netlify
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# SPA fallback for client-side routing (Polaris tabs, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Note: This site is https://statenotfate.netlify.app
# Artifacts sourced from Obsidian vault BUILD/polaris-24.x/ (single source of truth)
# State, not fate. Small actions + visible proof = progress.